<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Infra-Tutorial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #2563eb;
      --base-font-size: 15px;
      --base-line-height: 1.75;
      --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;

      /* sidebar */
      --sidebar-background: #f9fafb;
      --sidebar-border-color: #e5e7eb;
      --sidebar-name-color: #111827;
      --sidebar-nav-link-color: #374151;
      --sidebar-nav-link-color--active: #2563eb;
      --sidebar-nav-link-font-weight--active: 600;

      /* content */
      --content-max-width: 860px;
      --heading-color: #111827;
      --link-color: #2563eb;
      --link-text-decoration: none;
      --link-text-decoration--hover: underline;
      --code-theme-background: #f3f4f6;
      --code-theme-text: #111827;
      --code-font-size: 0.875em;
      --blockquote-border-color: #2563eb;
      --blockquote-color: #6b7280;

      /* table */
      --table-head-background: #f3f4f6;
      --table-row-odd-background: #ffffff;
      --table-row-even-background: #f9fafb;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI-Infra-Tutorial',
      repo: 'https://github.com/zikunchen/llm-lab',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 2,
      auto2top: true,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
